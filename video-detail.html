<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video - EditoFam</title>
    <style>
        :root {
            --background: #0f172a;
            --foreground: #f1f5f9;
            --surface: #1e293b;
            --surface-secondary: #334155;
            --muted: #94a3b8;
            --border: #475569;
            --primary: #60a5fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background-color: var(--background);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 1rem;
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 900;
        }

        a.back-btn {
            padding: 0.5rem 1rem;
            background-color: var(--surface);
            color: var(--foreground);
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid var(--border);
            display: inline-block;
        }

        main {
            max-width: 80rem;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .video-container {
            background-color: var(--surface);
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            display: block;
        }

        .video-info {
            padding: 2rem;
        }

        .video-title {
            font-size: 1.875rem;
            font-weight: 900;
            color: var(--foreground);
            margin-bottom: 1rem;
        }

        .video-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .meta-label {
            color: var(--muted);
            font-size: 0.875rem;
        }

        .meta-value {
            color: var(--foreground);
            font-weight: 600;
            font-size: 1.125rem;
        }

        .video-caption {
            color: var(--muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--surface-secondary);
            color: var(--foreground);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        button.liked {
            background-color: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border-color: #f87171;
        }

        .comments-section {
            border-top: 1px solid var(--border);
            padding-top: 2rem;
        }

        .comments-title {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--foreground);
            margin-bottom: 1.5rem;
        }

        .comment-form {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        input[type="text"] {
            flex: 1;
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: var(--foreground);
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .comment-btn {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .comment {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .comment-author {
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 0.25rem;
        }

        .comment-text {
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        .comment-time {
            font-size: 0.75rem;
            color: var(--border);
        }

        .empty-comments {
            text-align: center;
            color: var(--muted);
            padding: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>EditoFam</h1>
            <a href="index.html" class="back-btn">← Home</a>
        </div>
    </header>

    <main>
        <div class="video-container">
            <video id="videoPlayer" controls></video>
        </div>

        <div class="video-info">
            <h2 class="video-title" id="videoTitle">Loading...</h2>
            
            <div class="video-meta">
                <div class="meta-item">
                    <span class="meta-label">Views</span>
                    <span class="meta-value" id="viewCount">0</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Likes</span>
                    <span class="meta-value" id="likeCount">0</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Uploader</span>
                    <span class="meta-value" id="uploader">Unknown</span>
                </div>
            </div>

            <p class="video-caption" id="videoCaption"></p>

            <div class="actions">
                <button id="likeBtn" onclick="toggleLike()">❤️ Like</button>
                <button onclick="shareVideo()">📤 Share</button>
            </div>

            <div class="comments-section">
                <h3 class="comments-title">Comments</h3>
                
                <div class="comment-form">
                    <input type="text" id="commentInput" placeholder="Add a comment...">
                    <button class="comment-btn" onclick="addComment()">Post</button>
                </div>

                <div class="comments-list" id="commentsList">
                    <div class="empty-comments">No comments yet</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer';
        let currentVideoId = null;
        let isLiked = false;

        async function loadVideo() {
            currentVideoId = localStorage.getItem('selectedVideoId');
            if (!currentVideoId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch(`${BACKEND_URL}/api/videos/${currentVideoId}`);
                const video = await response.json();

                document.getElementById('videoTitle').textContent = video.title;
                document.getElementById('videoCaption').textContent = video.caption || 'No caption provided';
                document.getElementById('viewCount').textContent = video.views;
                document.getElementById('likeCount').textContent = video.likes;
                document.getElementById('uploader').textContent = video.uploader;

                const videoPlayer = document.getElementById('videoPlayer');
                videoPlayer.src = `${BACKEND_URL}${video.filePath}`;

                // Increment view count
                await fetch(`${BACKEND_URL}/api/videos/${currentVideoId}/view`, { method: 'POST' });

                loadComments();
            } catch (error) {
                console.error('Error loading video:', error);
            }
        }

        async function toggleLike() {
            const userName = localStorage.getItem('userName') || 'Guest';
            const likeBtn = document.getElementById('likeBtn');
            const likeCount = document.getElementById('likeCount');

            try {
                const response = await fetch(`${BACKEND_URL}/api/videos/${currentVideoId}/like`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userName })
                });

                const result = await response.json();
                isLiked = result.liked;

                if (isLiked) {
                    likeBtn.classList.add('liked');
                    likeCount.textContent = parseInt(likeCount.textContent) + 1;
                } else {
                    likeBtn.classList.remove('liked');
                    likeCount.textContent = parseInt(likeCount.textContent) - 1;
                }
            } catch (error) {
                console.error('Error toggling like:', error);
            }
        }

        async function addComment() {
            const commentInput = document.getElementById('commentInput');
            const text = commentInput.value.trim();

            if (!text) return;

            const author = localStorage.getItem('userName') || 'Guest';

            try {
                await fetch(`${BACKEND_URL}/api/videos/${currentVideoId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, text })
                });

                commentInput.value = '';
                loadComments();
            } catch (error) {
                console.error('Error adding comment:', error);
            }
        }

        async function loadComments() {
            try {
                const response = await fetch(`${BACKEND_URL}/api/videos/${currentVideoId}/comments`);
                const comments = await response.json();

                const commentsList = document.getElementById('commentsList');
                commentsList.innerHTML = '';

                if (comments.length === 0) {
                    commentsList.innerHTML = '<div class="empty-comments">No comments yet</div>';
                } else {
                    comments.forEach(comment => {
                        const commentEl = document.createElement('div');
                        commentEl.className = 'comment';
                        commentEl.innerHTML = `
                            <div class="comment-author">${comment.author}</div>
                            <div class="comment-text">${comment.text}</div>
                            <div class="comment-time">${new Date(comment.timestamp).toLocaleDateString()}</div>
                        `;
                        commentsList.appendChild(commentEl);
                    });
                }
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        function shareVideo() {
            const videoTitle = document.getElementById('videoTitle').textContent;
            const text = `Check out "${videoTitle}" on EditoFam!`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'EditoFam',
                    text: text,
                    url: window.location.href
                }).catch(err => console.log('Error sharing:', err));
            } else {
                alert(text + '\n\n' + window.location.href);
            }
        }

        document.addEventListener('DOMContentLoaded', loadVideo);
    </script>
</body>
</html>
