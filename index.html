<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EditoFam - Video Sharing Platform</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --background: #0a0e27;
            --foreground: #f1f5f9;
            --surface: rgba(30, 41, 59, 0.6);
            --surface-secondary: rgba(51, 65, 85, 0.5);
            --muted: #cbd5e1;
            --border: rgba(148, 163, 184, 0.2);
            --primary: #60a5fa;
            --primary-light: #93c5fd;
            --accent: #a78bfa;
            --accent-light: #ddd6fe;
            --error: #f87171;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated mesh gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(168, 85, 247, 0.2) 0%, transparent 40%);
            pointer-events: none;
            z-index: 1;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Blur blobs for depth */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            50% {
                transform: translateY(-50px) translateX(30px);
            }
        }

        header {
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button, a.button {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
        }

        button:hover, a.button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(96, 165, 250, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .logout-btn {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            box-shadow: 0 4px 15px rgba(248, 113, 113, 0.3);
        }

        .logout-btn:hover {
            box-shadow: 0 6px 20px rgba(248, 113, 113, 0.5);
        }

        .profile-btn {
            background: rgba(96, 165, 250, 0.1);
            color: var(--foreground);
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .profile-btn:hover {
            background: rgba(96, 165, 250, 0.2);
            border-color: rgba(96, 165, 250, 0.5);
        }

        /* LIQUID GLASS WARNING BANNER */
        .warning-banner {
            max-width: 80rem;
            margin: 0 auto;
            padding: 1rem;
            display: none;
        }

        .warning-banner.show {
            display: block;
        }

        .warning-content {
            display: flex;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .warning-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .warning-text p {
            margin: 0;
            color: var(--foreground);
        }

        .warning-text p:first-child {
            font-weight: 700;
        }

        .warning-text p:last-child {
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: 0.35rem;
        }

        main {
            max-width: 80rem;
            margin: 0 auto;
            padding: 2rem 1rem;
            position: relative;
            z-index: 2;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        /* LIQUID GLASS VIDEO CARDS */
        .video-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .video-card:hover {
            transform: translateY(-8px);
            border-color: rgba(96, 165, 250, 0.4);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 48px rgba(96, 165, 250, 0.2);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.2) 0%, rgba(167, 139, 250, 0.2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 1;
        }

        .play-icon {
            position: absolute;
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.9) 0%, rgba(59, 130, 246, 0.9) 100%);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            z-index: 2;
            box-shadow: 0 8px 20px rgba(96, 165, 250, 0.4);
            transition: all 0.3s ease;
        }

        .video-card:hover .play-icon {
            transform: scale(1.1);
            box-shadow: 0 12px 30px rgba(96, 165, 250, 0.6);
        }

        .video-info {
            padding: 1.25rem;
        }

        .video-title {
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1rem;
        }

        .video-caption {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: 0.75rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* LIQUID GLASS EMPTY STATE */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 6rem;
            padding-bottom: 6rem;
            gap: 1rem;
            text-align: center;
        }

        .empty-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state h2 {
            font-size: 1.875rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .empty-state p {
            color: var(--muted);
            max-width: 28rem;
        }

        /* PREMIUM FLOATING ACTION BUTTON */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(96, 165, 250, 0.4);
            border: none;
            z-index: 40;
        }

        .fab:hover {
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 12px 48px rgba(96, 165, 250, 0.6);
        }

        .fab:active {
            transform: scale(0.95);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--muted);
        }

        .spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .fab {
                width: 3.5rem;
                height: 3.5rem;
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>EditoFam</h1>
            <div class="auth-buttons">
                <button id="googleLoginBtn" onclick="handleGoogleLogin()">Sign in with Google</button>
                <button class="profile-btn" id="profileBtn" style="display: none;" onclick="toggleProfileMenu()">👤 Profile</button>
                <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="warning-banner" id="warningBanner">
        <div class="warning-content">
            <div class="warning-icon">⏰</div>
            <div class="warning-text">
                <p>Guest uploads expire in 30 days</p>
                <p>Log in with Google to keep your videos permanently</p>
            </div>
        </div>
    </div>

    <main>
        <div id="videoContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 1rem;">Loading videos...</p>
            </div>
        </div>
    </main>

    <button class="fab" onclick="window.location.href='/upload.html'" title="Upload video">➕</button>

    <script>
        const BACKEND_URL = 'https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer';

        function loadVideos() {
            const xhr = new XMLHttpRequest();
            xhr.timeout = 10000;

            xhr.onload = function() {
                if (xhr.status === 200) {
                    try {
                        const videos = JSON.parse(xhr.responseText);
                        displayVideos(videos);
                    } catch (e) {
                        document.getElementById('videoContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h2>Error</h2><p>Failed to load videos</p></div>';
                    }
                }
            };

            xhr.onerror = function() {
                document.getElementById('videoContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h2>Connection Error</h2><p>Unable to connect to server</p></div>';
            };

            xhr.ontimeout = function() {
                document.getElementById('videoContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">⏱️</div><h2>Timeout</h2><p>Request took too long</p></div>';
            };

            xhr.open('GET', BACKEND_URL + '/api/videos', true);
            xhr.send();
        }

        function displayVideos(videos) {
            if (videos.length === 0) {
                document.getElementById('videoContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎬</div>
                        <h2>No videos yet</h2>
                        <p>Be the first to share a video on EditoFam!</p>
                    </div>
                `;
                return;
            }

            const html = videos.map(video => `
                <div class="video-card" onclick="window.location.href='/video.html?id=${video.id}'">
                    <div class="video-thumbnail">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title || 'Untitled')}</div>
                        <div class="video-caption">${escapeHtml(video.caption || '')}</div>
                        <div class="video-stats">
                            <span>❤️ ${video.likes || 0}</span>
                            <span>👁️ ${video.views || 0}</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('videoContainer').innerHTML = `<div class="video-grid">${html}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleGoogleLogin() {
            google.accounts.id.initialize({
                client_id: '1006923825633-5fk5oj4u5gm0kqkfbqhkgqrr6c6p5c6p.apps.googleusercontent.com',
                callback: onSignIn
            });
            google.accounts.id.renderButton(
                document.getElementById('googleLoginBtn'),
                { theme: 'dark', size: 'large' }
            );
            google.accounts.id.prompt();
        }

        function onSignIn(response) {
            const token = response.credential;
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            const data = JSON.parse(jsonPayload);
            localStorage.setItem('userName', data.name);
            localStorage.setItem('userEmail', data.email);
            updateAuthUI();
        }

        function logout() {
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            updateAuthUI();
        }

        function updateAuthUI() {
            const userName = localStorage.getItem('userName');
            const googleLoginBtn = document.getElementById('googleLoginBtn');
            const profileBtn = document.getElementById('profileBtn');
            const logoutBtn = document.getElementById('logoutBtn');

            if (userName) {
                googleLoginBtn.style.display = 'none';
                profileBtn.style.display = 'block';
                logoutBtn.style.display = 'block';
                profileBtn.textContent = `👤 ${userName}`;
            } else {
                googleLoginBtn.style.display = 'block';
                profileBtn.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        }

        // Show warning banner
        document.getElementById('warningBanner').classList.add('show');

        // Load videos on page load
        loadVideos();

        // Refresh videos every 30 seconds
        setInterval(loadVideos, 30000);

        // Update auth UI on page load
        updateAuthUI();
    </script>
</body>
</html>
