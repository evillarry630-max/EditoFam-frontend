<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - EditoFam</title>
    <style>
        :root {
            --background: #0a0e27;
            --foreground: #f1f5f9;
            --surface: rgba(30, 41, 59, 0.6);
            --surface-secondary: rgba(51, 65, 85, 0.5);
            --muted: #cbd5e1;
            --border: rgba(148, 163, 184, 0.2);
            --primary: #60a5fa;
            --primary-light: #93c5fd;
            --accent: #a78bfa;
            --accent-light: #ddd6fe;
            --error: #f87171;
            --success: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0a0e27 100%);
            color: var(--foreground);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated mesh gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Blur blobs for depth */
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            50% {
                transform: translateY(-50px) translateX(30px);
            }
        }

        header {
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        a.back-btn {
            padding: 0.5rem 1.25rem;
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            display: inline-block;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.1);
        }

        a.back-btn:hover {
            background: rgba(96, 165, 250, 0.2);
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(96, 165, 250, 0.3);
        }

        main {
            max-width: 42rem;
            margin: 0 auto;
            padding: 3rem 1rem;
            position: relative;
            z-index: 2;
        }

        .page-title {
            margin-bottom: 2rem;
        }

        .page-title h2 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .page-title p {
            color: var(--muted);
            font-size: 1rem;
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        label {
            display: block;
            color: var(--foreground);
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 1.05rem;
        }

        /* LIQUID GLASS UPLOAD BOX */
        .upload-box {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .upload-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, rgba(167, 139, 250, 0.05) 100%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .upload-box:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 12px 48px rgba(96, 165, 250, 0.2);
            transform: translateY(-4px);
        }

        .upload-box:hover::before {
            opacity: 1;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .upload-box p {
            margin: 0.75rem 0;
            position: relative;
            z-index: 2;
        }

        .upload-box p:first-of-type {
            color: var(--foreground);
            font-weight: 700;
            font-size: 1.1rem;
        }

        .upload-box p:last-of-type {
            color: var(--muted);
            font-size: 0.95rem;
        }

        #fileInput {
            display: none;
        }

        /* LIQUID GLASS TEXTAREA */
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 1.25rem;
            color: var(--foreground);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        textarea::placeholder {
            color: rgba(203, 213, 225, 0.5);
        }

        textarea:focus {
            outline: none;
            border-color: rgba(96, 165, 250, 0.5);
            border-top-color: rgba(96, 165, 250, 0.7);
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2), 0 0 20px rgba(96, 165, 250, 0.15);
        }

        .char-count {
            color: var(--muted);
            font-size: 0.875rem;
            margin-top: 0.75rem;
            text-align: right;
        }

        /* LIQUID GLASS VISIBILITY CONTAINER */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(96, 165, 250, 0.3);
            box-shadow: 0 12px 48px rgba(96, 165, 250, 0.15);
        }

        .visibility-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            padding: 0;
        }

        .visibility-info h3 {
            color: var(--foreground);
            font-weight: 700;
            margin: 0;
            font-size: 1.05rem;
        }

        .visibility-info p {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0.35rem 0 0 0;
        }

        .toggle-switch {
            width: 3.5rem;
            height: 1.75rem;
            border-radius: 9999px;
            background: rgba(148, 163, 184, 0.3);
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 1.4rem;
            height: 1.4rem;
            background: white;
            border-radius: 50%;
            top: 0.175rem;
            left: 0.175rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
        }

        .toggle-switch.active::after {
            left: 1.975rem;
        }

        .progress-bar {
            width: 100%;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 9999px;
            height: 0.75rem;
            overflow: hidden;
            margin-bottom: 1rem;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .progress-fill {
            background: linear-gradient(90deg, #60a5fa 0%, #a78bfa 100%);
            height: 100%;
            transition: width 0.3s ease;
            width: 0%;
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .progress-text {
            color: var(--muted);
            font-size: 0.875rem;
            text-align: center;
            margin-top: 0.75rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-direction: column;
            margin-top: 2.5rem;
        }

        button {
            padding: 1.1rem;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        /* PREMIUM UPLOAD BUTTON */
        .upload-btn {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(96, 165, 250, 0.3);
            position: relative;
            overflow: hidden;
        }

        .upload-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .upload-btn:hover:not(:disabled) {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 12px 32px rgba(96, 165, 250, 0.5);
        }

        .upload-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .upload-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .upload-btn:disabled {
            background: rgba(148, 163, 184, 0.3);
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: none;
        }

        .cancel-btn {
            border: 1.5px solid rgba(96, 165, 250, 0.3);
            color: var(--foreground);
            background: rgba(96, 165, 250, 0.05);
            text-decoration: none;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            background: rgba(96, 165, 250, 0.15);
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(96, 165, 250, 0.2);
        }

        .hidden {
            display: none;
        }

        /* LIQUID GLASS SUCCESS MESSAGE */
        .success-message {
            background: rgba(52, 211, 153, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: #86efac;
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
            box-shadow: 0 8px 32px rgba(52, 211, 153, 0.1);
            font-weight: 600;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        /* LIQUID GLASS ERROR MESSAGE */
        .error-message {
            background: rgba(248, 113, 113, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: #fca5a5;
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
            box-shadow: 0 8px 32px rgba(248, 113, 113, 0.1);
            font-weight: 600;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .page-title h2 {
                font-size: 1.5rem;
            }

            .upload-box {
                padding: 3rem 1.5rem;
            }

            .upload-icon {
                font-size: 3rem;
            }

            button {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>EditoFam</h1>
            <a href="index.html" class="back-btn">← Back</a>
        </div>
    </header>

    <main>
        <div class="page-title">
            <h2>Upload</h2>
            <p>Share your moment in crystal clear quality</p>
        </div>

        <div id="successMessage" class="success-message">
            ✅ Video uploaded successfully!
        </div>

        <div id="errorMessage" class="error-message">
            ❌ <span id="errorText">Upload failed</span>
        </div>

        <!-- LIQUID GLASS UPLOAD BOX -->
        <div class="form-section">
            <label>Select Video</label>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📹</div>
                <p id="fileName">Tap to select video</p>
                <p>Up to 500MB</p>
            </div>
            <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
        </div>

        <!-- LIQUID GLASS CAPTION TEXTAREA -->
        <div class="form-section">
            <label for="caption">Caption (Optional)</label>
            <textarea id="caption" placeholder="Add a caption..." maxlength="500" rows="4" oninput="updateCharCount()"></textarea>
            <div class="char-count"><span id="charCount">0</span>/500 characters</div>
        </div>

        <!-- LIQUID GLASS VISIBILITY CONTAINER -->
        <div class="form-section">
            <label>Visibility</label>
            <div class="glass">
                <button class="visibility-toggle" onclick="toggleVisibility()">
                    <div class="visibility-info">
                        <h3 id="visibilityLabel">🌍 Public</h3>
                        <p id="visibilityDesc">Anyone can find and watch</p>
                    </div>
                    <div class="toggle-switch active" id="toggleSwitch"></div>
                </button>
            </div>
        </div>

        <div id="progressSection" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text"><span id="progressPercent">0</span>% uploaded</div>
        </div>

        <!-- PREMIUM BUTTON GROUP -->
        <div class="button-group">
            <button class="upload-btn" id="uploadBtn" onclick="handleUpload()" disabled>Upload Video</button>
            <a href="index.html" class="cancel-btn">Cancel</a>
        </div>
    </main>

    <script>
        const BACKEND_URL = 'https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer';
        let isPublic = true;
        let selectedFile = null;

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            const fileName = document.getElementById('fileName');
            const uploadBtn = document.getElementById('uploadBtn');
            
            if (selectedFile) {
                fileName.textContent = selectedFile.name;
                uploadBtn.disabled = false;
            }
        }

        function updateCharCount() {
            const caption = document.getElementById('caption');
            document.getElementById('charCount').textContent = caption.value.length;
        }

        function toggleVisibility() {
            isPublic = !isPublic;
            const label = document.getElementById('visibilityLabel');
            const desc = document.getElementById('visibilityDesc');
            const toggle = document.getElementById('toggleSwitch');

            if (isPublic) {
                label.textContent = '🌍 Public';
                desc.textContent = 'Anyone can find and watch';
                toggle.classList.add('active');
            } else {
                label.textContent = '🔒 Private';
                desc.textContent = 'Only accessible via direct link';
                toggle.classList.remove('active');
            }
        }

        async function handleUpload() {
            if (!selectedFile) {
                alert('Please select a video first');
                return;
            }

            const uploadBtn = document.getElementById('uploadBtn');
            const progressSection = document.getElementById('progressSection');
            const errorMessage = document.getElementById('errorMessage');
            const caption = document.getElementById('caption').value;
            const uploader = localStorage.getItem('userName') || 'Guest';
            
            uploadBtn.disabled = true;
            progressSection.classList.remove('hidden');
            errorMessage.classList.remove('show');

            const formData = new FormData();
            formData.append('video', selectedFile);
            formData.append('title', selectedFile.name);
            formData.append('caption', caption);
            formData.append('uploader', uploader);
            formData.append('isPublic', isPublic);

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = Math.round((e.loaded / e.total) * 100);
                        document.getElementById('progressFill').style.width = percentComplete + '%';
                        document.getElementById('progressPercent').textContent = percentComplete;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        
                        // Show success message
                        const successMsg = document.getElementById('successMessage');
                        successMsg.classList.add('show');
                        
                        // Reset form
                        setTimeout(() => {
                            selectedFile = null;
                            document.getElementById('fileInput').value = '';
                            document.getElementById('fileName').textContent = 'Tap to select video';
                            document.getElementById('caption').value = '';
                            document.getElementById('charCount').textContent = '0';
                            progressSection.classList.add('hidden');
                            uploadBtn.disabled = true;
                            successMsg.classList.remove('show');
                            
                            // Redirect to home
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        throw new Error('Upload failed');
                    }
                });

                xhr.addEventListener('error', () => {
                    const errorMsg = document.getElementById('errorMessage');
                    document.getElementById('errorText').textContent = 'Upload failed. Please try again.';
                    errorMsg.classList.add('show');
                    uploadBtn.disabled = false;
                    progressSection.classList.add('hidden');
                });

                xhr.open('POST', `${BACKEND_URL}/api/videos/upload`);
                xhr.send(formData);
            } catch (error) {
                const errorMsg = document.getElementById('errorMessage');
                document.getElementById('errorText').textContent = 'Error: ' + error.message;
                errorMsg.classList.add('show');
                uploadBtn.disabled = false;
                progressSection.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
