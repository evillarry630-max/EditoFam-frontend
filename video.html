<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EditoFam - Video</title>
  <meta property="og:title" content="EditoFam Video" />
  <meta property="og:description" content="Watch this video on EditoFam" />
  <meta property="og:image" content="https://editofam.vercel.app/default-thumbnail.png" />
  <meta property="og:type" content="video.other" />
  <meta name="twitter:card" content="player" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
      color: #e0e7ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
    }
    
    header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .back-btn {
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .back-btn:hover {
      background: rgba(96, 165, 250, 0.2);
    }
    
    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    
    .video-player {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    
    .video-info {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    
    .video-title {
      font-size: 1.75rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #f1f5f9;
    }
    
    .video-caption {
      color: #cbd5e1;
      margin-bottom: 1rem;
      line-height: 1.6;
    }
    
    .video-meta {
      display: flex;
      gap: 2rem;
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    
    .video-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }
    
    .action-btn {
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .action-btn:hover {
      background: rgba(96, 165, 250, 0.2);
      transform: translateY(-2px);
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: #94a3b8;
    }
    
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 1.5rem;
      border-radius: 0.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">EditoFam</div>
    <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  </header>
  
  <div class="container">
    <div id="content">
      <div class="loading">Loading video...</div>
    </div>
  </div>

  <script>
    async function loadVideo() {
      try {
        const videoId = new URLSearchParams(window.location.search).get('id');
        
        if (!videoId) {
          document.getElementById('content').innerHTML = '<div class="error">No video ID provided</div>';
          return;
        }
        
        const response = await fetch(`https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer/api/videos/${videoId}`);
        if (!response.ok) throw new Error('Video not found');
        
        const video = await response.json();
        
        // Update OG meta tags dynamically
        updateMetaTags(video);
        
        const videoUrl = `https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer${video.filePath}`;
        
        document.getElementById('content').innerHTML = `
          <div class="video-player">
            <video controls>
              <source src="${videoUrl}" type="video/mp4">
              Your browser does not support the video tag.
            </video>
          </div>
          
          <div class="video-info">
            <div class="video-title">${escapeHtml(video.title || 'Untitled Video')}</div>
            <div class="video-caption">${escapeHtml(video.caption || '')}</div>
            
            <div class="video-meta">
              <span>👤 ${escapeHtml(video.uploader || 'Anonymous')}</span>
              <span>❤️ ${video.likes || 0} likes</span>
              <span>👁️ ${video.views || 0} views</span>
            </div>
            
            <div class="video-actions">
              <button class="action-btn" onclick="likeVideo('${videoId}')">❤️ Like</button>
              <button class="action-btn" onclick="shareVideo('${videoId}')">📤 Share</button>
            </div>
          </div>
        `;
      } catch (error) {
        document.getElementById('content').innerHTML = `<div class="error">Error loading video: ${error.message}</div>`;
      }
    }
    
    function updateMetaTags(video) {
      const title = video.title || 'EditoFam Video';
      const description = video.caption || 'Watch this video on EditoFam';
      const videoUrl = `https://editofam.vercel.app/video.html?id=${video.id}`;
      const thumbnailUrl = `https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer/api/videos/${video.id}/thumbnail`;
      
      // Update title
      document.title = title + ' - EditoFam';
      
      // Update or create OG meta tags
      updateMetaTag('og:title', title);
      updateMetaTag('og:description', description);
      updateMetaTag('og:image', thumbnailUrl);
      updateMetaTag('og:url', videoUrl);
      updateMetaTag('twitter:title', title);
      updateMetaTag('twitter:description', description);
      updateMetaTag('twitter:image', thumbnailUrl);
    }
    
    function updateMetaTag(property, content) {
      let tag = document.querySelector(`meta[property="${property}"]`);
      if (!tag) {
        tag = document.createElement('meta');
        tag.setAttribute('property', property);
        document.head.appendChild(tag);
      }
      tag.setAttribute('content', content);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    async function likeVideo(videoId) {
      const userName = localStorage.getItem('userName') || 'Anonymous';
      try {
        const response = await fetch(`https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer/api/videos/${videoId}/like`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userName })
        });
        if (response.ok) {
          alert('Video liked!');
          loadVideo();
        }
      } catch (error) {
        alert('Error liking video');
      }
    }
    
    function shareVideo(videoId) {
      const url = `https://editofam.vercel.app/video.html?id=${videoId}`;
      if (navigator.share) {
        navigator.share({
          title: 'Check out this video on EditoFam',
          url: url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert('Link copied to clipboard!');
      }
    }
    
    loadVideo();
  </script>
</body>
</html>
