<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EditoFam - Video</title>
  <meta property="og:title" content="EditoFam Video" />
  <meta property="og:description" content="Watch this video on EditoFam" />
  <meta property="og:image" content="https://editofam.vercel.app/default-thumbnail.png" />
  <meta property="og:type" content="video.other" />
  <meta name="twitter:card" content="player" />
  <style>
    :root {
      --background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
      --foreground: #f1f5f9;
      --surface: rgba(30, 41, 59, 0.6);
      --muted: #cbd5e1;
      --border: rgba(148, 163, 184, 0.2);
      --primary: #60a5fa;
      --accent: #a78bfa;
      --error: #f87171;
      --success: #34d399;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(96, 165, 250, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(167, 139, 250, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    
    header {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 10;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }
    
    .back-btn {
      background: rgba(96, 165, 250, 0.1);
      border: 1.5px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      font-weight: 600;
    }
    
    .back-btn:hover {
      background: rgba(96, 165, 250, 0.2);
      border-color: rgba(96, 165, 250, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
    }
    
    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
      position: relative;
      z-index: 1;
    }
    
    .video-player {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.25rem;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(10px);
    }
    
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    
    .video-info {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 1.25rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .video-title {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 0.75rem;
      color: var(--foreground);
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .video-caption {
      color: var(--muted);
      margin-bottom: 1.5rem;
      line-height: 1.6;
      font-size: 1rem;
    }
    
    .video-meta {
      display: flex;
      gap: 2rem;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
    }

    .video-meta span {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .video-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    
    .action-btn {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.2) 0%, rgba(167, 139, 250, 0.2) 100%);
      border: 1.5px solid rgba(96, 165, 250, 0.3);
      color: #60a5fa;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.1);
    }
    
    .action-btn:hover {
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.3) 0%, rgba(167, 139, 250, 0.3) 100%);
      border-color: rgba(96, 165, 250, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(96, 165, 250, 0.3);
    }

    .action-btn:active {
      transform: translateY(0);
    }
    
    .delete-btn {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.2) 0%, rgba(239, 68, 68, 0.2) 100%);
      border: 1.5px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
    }
    
    .delete-btn:hover {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.3) 0%, rgba(239, 68, 68, 0.3) 100%);
      border-color: rgba(248, 113, 113, 0.5);
      box-shadow: 0 6px 20px rgba(248, 113, 113, 0.3);
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .spinner {
      display: inline-block;
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid rgba(96, 165, 250, 0.3);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: linear-gradient(135deg, rgba(248, 113, 113, 0.1) 0%, rgba(239, 68, 68, 0.1) 100%);
      border: 1.5px solid rgba(248, 113, 113, 0.3);
      color: #fca5a5;
      padding: 1.5rem;
      border-radius: 0.75rem;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(248, 113, 113, 0.1);
    }

    @media (max-width: 768px) {
      .video-title {
        font-size: 1.5rem;
      }

      .video-meta {
        gap: 1rem;
        font-size: 0.85rem;
      }

      .video-actions {
        gap: 0.75rem;
      }

      .action-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">EditoFam</div>
    <button class="back-btn" onclick="window.location.href='/'">← Back</button>
  </header>
  
  <div class="container">
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 1rem;">Loading video...</p>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://4000-i1b1kqe9kgc2180a4jwf3-7c70c46e.sg1.manus.computer';
    
    function loadVideo() {
      const videoId = new URLSearchParams(window.location.search).get('id');
      
      if (!videoId) {
        document.getElementById('content').innerHTML = '<div class="error">No video ID provided</div>';
        return;
      }
      
      const xhr = new XMLHttpRequest();
      xhr.timeout = 5000;
      
      xhr.onload = function() {
        if (xhr.status === 200) {
          try {
            const video = JSON.parse(xhr.responseText);
            displayVideo(video, videoId);
          } catch (e) {
            document.getElementById('content').innerHTML = '<div class="error">Error parsing video data</div>';
          }
        } else {
          document.getElementById('content').innerHTML = '<div class="error">Video not found (HTTP ' + xhr.status + ')</div>';
        }
      };
      
      xhr.onerror = function() {
        document.getElementById('content').innerHTML = '<div class="error">Error loading video - network error</div>';
      };
      
      xhr.ontimeout = function() {
        document.getElementById('content').innerHTML = '<div class="error">Error loading video - request timeout</div>';
      };
      
      xhr.open('GET', BACKEND_URL + '/api/videos/' + videoId, true);
      xhr.send();
    }
    
    function displayVideo(video, videoId) {
      const videoUrl = BACKEND_URL + video.filePath;
      
      document.getElementById('content').innerHTML = `
        <div class="video-player">
          <video controls>
            <source src="${videoUrl}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        </div>
        
        <div class="video-info">
          <div class="video-title">${escapeHtml(video.title || 'Untitled Video')}</div>
          <div class="video-caption">${escapeHtml(video.caption || '')}</div>
          
          <div class="video-meta">
            <span>👤 ${escapeHtml(video.uploader || 'Anonymous')}</span>
            <span>❤️ ${video.likes || 0} likes</span>
            <span>👁️ ${video.views || 0} views</span>
          </div>
          
          <div class="video-actions">
            <button class="action-btn" onclick="likeVideo('${videoId}')">❤️ Like</button>
            <button class="action-btn" onclick="shareVideo('${videoId}')">📤 Share</button>
            ${localStorage.getItem('userName') === video.uploader ? `<button class="action-btn delete-btn" onclick="deleteVideo('${videoId}')">🗑️ Delete</button>` : ''}
          </div>
        </div>
      `;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function likeVideo(videoId) {
      const userName = localStorage.getItem('userName') || 'Anonymous';
      const xhr = new XMLHttpRequest();
      xhr.open('POST', BACKEND_URL + '/api/videos/' + videoId + '/like', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() {
        if (xhr.status === 200) {
          alert('Video liked!');
          loadVideo();
        }
      };
      xhr.send(JSON.stringify({ userName: userName }));
    }
    
    function shareVideo(videoId) {
      const url = 'https://editofam.vercel.app/video.html?id=' + videoId;
      if (navigator.share) {
        navigator.share({
          title: 'Check out this video on EditoFam',
          url: url
        });
      } else {
        navigator.clipboard.writeText(url);
        alert('Link copied to clipboard!');
      }
    }
    
    function deleteVideo(videoId) {
      if (!confirm('Are you sure you want to delete this video? This action cannot be undone.')) {
        return;
      }
      
      const userName = localStorage.getItem('userName') || 'Anonymous';
      const xhr = new XMLHttpRequest();
      xhr.open('DELETE', BACKEND_URL + '/api/videos/' + videoId, true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.onload = function() {
        if (xhr.status === 200) {
          alert('Video deleted successfully!');
          window.location.href = 'index.html';
        } else {
          alert('Failed to delete video. You can only delete your own videos.');
        }
      };
      xhr.send(JSON.stringify({ userName: userName }));
    }
    
    window.addEventListener('DOMContentLoaded', loadVideo);
  </script>
</body>
</html>
